site_name: GT/GPT/009/2026 - Biometric Authentication Project
site_description: Knowledge portal for the Gauteng Provincial Treasury biometric authentication project and tender response.
site_url: https://sumon9007.github.io/wmi-proj-gpt/
repo_url: https://github.com/sumon9007/wmi-proj-gpt
repo_name: sumon9007/wmi-proj-gpt

docs_dir: 06-knowledge-portal/docs
site_dir: site

theme:
  name: material
  language: en
  font:
    text: Source Sans 3
    code: IBM Plex Mono
  logo: null
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: custom
      accent: custom
  features:
    - navigation.expand
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.tracking
    - toc.follow
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Project Overview: project-overview.md
  - Analysis:
      - RFP Summary: analysis/rfp-summary.md
      - Key Requirements: analysis/key-requirements.md
      - Risks, Assumptions, and Dependencies: analysis/risks-assumptions-dependencies.md
      - Customer Drivers: analysis/customer-drivers.md
      - Delivery Implications: analysis/delivery-implications.md
  - Architecture: architecture.md
  - Implementation: implementation.md
  - Operations: operations.md
  - Decisions: decisions.md
  - FAQ: faq.md
