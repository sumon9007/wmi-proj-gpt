site_name: Gauteng Treasury Knowledge Portal
site_description: Internal knowledge portal for the Gauteng Provincial Treasury biometric authentication engagement.
site_url: https://sumon9007.github.io/wmi-proj-gpt/
repo_url: https://github.com/sumon9007/wmi-proj-gpt
repo_name: sumon9007/wmi-proj-gpt

docs_dir: 06-knowledge-portal/docs
site_dir: site

theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Project Overview: project-overview.md
  - Architecture: architecture.md
  - Implementation: implementation.md
  - Operations: operations.md
  - Decisions: decisions.md
  - FAQ: faq.md
